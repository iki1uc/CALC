<script>
// NC-Träger
const muSharp = { 
  nc: "NC-GANZ" 
};

// Parteien (minimal)
const parties = [
  { id: 1, op: null },
  { id: 2, op: null }
];

// CALC-Operator
function CALC(input) {
  const nc = muSharp.nc;

  parties.forEach(p => {
    p.op = { from: input, nc };
  });

  return { nc, parties };
}

// LIVE-Anmeldung für CALC
document.addEventListener("DOMContentLoaded", () => {
  const calcStatus = document.getElementById("calc-status");

  // CALC meldet sich an → GRÜN
  calcStatus.textContent = "bereit";
  calcStatus.className = "state green";
});
</script>

<!-- LIVE-MELDER BLOCK -->
<div class="status-block">
  <strong>CALC-00</strong><br>
  Status: <span id="calc-status" class="state yellow">lädt…</span><br>
  Modus: Operator aktiv (Impuls / Berechnung / EVO-Start)
</div>
